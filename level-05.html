<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wu Xing Interativo — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,700&family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0F0E0A;
    color: #F2EEE4;
    font-family: 'Noto Sans', sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 40px;
    font-family: 'Lora', serif;
  }

  .wxd-wrap {
    background: #1A1914;
    border: 1px solid rgba(192,154,74,.22);
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 40px;
  }

  .wxd-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .wxd-tab {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border: 1px solid rgba(192,154,74,.22);
    border-radius: 8px;
    background: transparent;
    color: #867C6A;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 200ms;
  }

  .wxd-tab--active {
    background: rgba(192,154,74,.08);
    border-color: #C09A4A;
    color: #D4B060;
  }

  .wxd-tab:hover:not(.wxd-tab--active) {
    color: #F2EEE4;
    background: #222018;
  }

  .wxd-info {
    height: 80px;
    margin-bottom: 24px;
    padding: 12px 16px;
    border-radius: 8px;
    background: #222018;
    transition: all 300ms;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .wxd-info-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #524C40;
    letter-spacing: 0.6px;
    display: none;
  }

  .wxd-info-hint.visible {
    display: block;
  }

  .wxd-info-content {
    display: none;
    gap: 16px;
    align-items: flex-start;
  }

  .wxd-info-content.visible {
    display: flex;
  }

  .wxd-info-glyph {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    line-height: 1;
    font-style: normal;
    flex-shrink: 0;
  }

  .wxd-info-text {
    flex-grow: 1;
  }

  .wxd-info-name {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    color: #D4B060;
  }

  .wxd-info-rel {
    font-family: 'Noto Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #C4BAA6;
    line-height: 1.6;
  }

  .wxd-svg {
    width: 100%;
    max-width: 500px;
    display: block;
    margin: 0 auto;
    overflow: visible;
  }

  /* Interatividade SVG */
  .wxd-node {
    cursor: pointer;
  }

  .wxd-node:focus {
    outline: none;
  }

  .wxd-node:hover circle,
  .wxd-node:focus circle {
    filter: brightness(1.25);
  }

  .wxd-node:hover .wxd-node-ring,
  .wxd-node:focus .wxd-node-ring {
    opacity: 0.5;
  }

  .wxd-node.active .wxd-node-ring {
    opacity: 1 !important;
    stroke-width: 3;
  }

  .wxd-arrow {
    transition: opacity 300ms, stroke-width 300ms, filter 300ms;
  }

  .wxd-arrow.highlighted {
    opacity: 1 !important;
    stroke-width: 4 !important;
    filter: drop-shadow(0 0 8px rgba(192,154,74,.6)) drop-shadow(0 0 16px rgba(192,154,74,.3));
  }

  .wxd-arrow.highlighted.gen {
    stroke: #D4B060 !important;
  }

  .wxd-arrow.highlighted.ctrl {
    stroke: #D4B060 !important;
  }

  .wxd-arrow.dimmed {
    opacity: 0.1 !important;
    stroke-width: 2 !important;
  }

  .wxd-gen-layer .wxd-arrow {
    opacity: 0.4;
  }

  .wxd-ctrl-layer {
    display: none;
  }

  .wxd-ctrl-layer.visible {
    display: block;
  }

  .wxd-ctrl-layer .wxd-arrow {
    opacity: 0.4;
  }

  @media (max-width: 600px) {
    .wxd-wrap {
      padding: 24px;
    }
    h1 {
      font-size: 24px;
    }
  }
</style>
</head>

      <circle cx="150" cy="666" r="150" fill="#50C880" class="wxd-node-bg"/>
      <circle cx="150" cy="666" r="150" fill="none" stroke="#50C880" stroke-width="2" opacity="0" class="wxd-node-ring"/>
      <g class="wxd-node" data-elem="wood" tabindex="0" role="button" aria-label="Madeira">
        <circle cx="150" cy="666" r="150" fill="#50C880" class="wxd-node-bg"/>
        <circle cx="150" cy="666" r="150" fill="none" stroke="#50C880" stroke-width="2" opacity="0" class="wxd-node-ring"/>

</div>

<script>
  const elemData = {
    water: { name: 'Água', hanzi: '水', color: '#7AA0E0', creates: 'wood', controlledBy: 'earth', controls: 'fire' },
    wood: { name: 'Madeira', hanzi: '木', color: '#50C880', creates: 'fire', controlledBy: 'metal', controls: 'earth' },
    fire: { name: 'Fogo', hanzi: '火', color: '#F05060', creates: 'earth', controlledBy: 'water', controls: 'metal' },
    earth: { name: 'Terra', hanzi: '土', color: '#E8B020', creates: 'metal', controlledBy: 'wood', controls: 'water' },
    metal: { name: 'Metal', hanzi: '金', color: '#C8C8C8', creates: 'water', controlledBy: 'fire', controls: 'wood' }
  };

  let currentCycle = 'gen';
  let activeElem = null;

  // Tab switching
  document.querySelectorAll('.wxd-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.wxd-tab').forEach(t => t.classList.remove('wxd-tab--active'));
      tab.classList.add('wxd-tab--active');
      currentCycle = tab.dataset.cycle;
      
      if (activeElem) {
        highlightCycle(activeElem, currentCycle);
      } else {
        const genLayer = document.getElementById('gen-layer');
        const ctrlLayer = document.getElementById('ctrl-layer');
        
        genLayer.style.display = currentCycle === 'gen' ? 'block' : 'none';
        ctrlLayer.classList.toggle('visible', currentCycle === 'ctrl');
      }
    });
  });

  // Element clicking
  document.querySelectorAll('.wxd-node').forEach(node => {
    node.addEventListener('click', () => {
      const elem = node.dataset.elem;
      activeElem = elem;
      
      document.querySelectorAll('.wxd-node').forEach(n => n.classList.remove('active'));
      node.classList.add('active');
      
      showInfo(elem);
      highlightCycle(elem, currentCycle);
    });
  });

  function showInfo(elem) {
    const data = elemData[elem];
    const infoContent = document.getElementById('info-content');
    const hint = document.querySelector('.wxd-info-hint');
    
    hint.classList.remove('visible');

    let relHtml;
    if (currentCycle === 'gen') {
      const creator = findCreator(elem);
      relHtml = `
        <strong>Gerado por:</strong> ${elemData[creator].name}<br>
        <strong>Gera:</strong> ${elemData[data.creates].name}
      `;
    } else {
      const controller = findController(elem);
      relHtml = `
        <strong>Controlado por:</strong> ${elemData[controller].name}<br>
        <strong>Controla:</strong> ${elemData[data.controls].name}
      `;
    }
    
    infoContent.innerHTML = `
      <div class="wxd-info-glyph">${data.hanzi}</div>
      <div class="wxd-info-text">
        <span class="wxd-info-name">${data.name}</span>
        <div class="wxd-info-rel">${relHtml}</div>
      </div>
    `;
    infoContent.classList.add('visible');
  }

  function findCreator(elem) {
    for (let key in elemData) {
      if (elemData[key].creates === elem) return key;
    }
    return null;
  }

  function highlightCycle(elem, cycle) {
    const arrows = document.querySelectorAll('.wxd-arrow');
    const nodes = document.querySelectorAll('.wxd-node');
    const genLayer = document.getElementById('gen-layer');
    const ctrlLayer = document.getElementById('ctrl-layer');

    // Alterna camadas conforme ciclo ativo
    genLayer.style.display = cycle === 'gen' ? 'block' : 'none';
    ctrlLayer.classList.toggle('visible', cycle === 'ctrl');

    arrows.forEach(arrow => arrow.classList.remove('highlighted', 'dimmed', 'gen', 'ctrl'));
    nodes.forEach(node => {
      if (node.dataset.elem !== elem) {
        node.classList.remove('active');
      }
    });

    if (cycle === 'gen') {
      const target = elemData[elem].creates;
      
      arrows.forEach(arrow => {
        if (arrow.dataset.from === elem && arrow.dataset.to === target) {
          arrow.classList.add('highlighted', 'gen');
        } else {
          arrow.classList.add('dimmed');
        }
      });
    } else {
      const controller = elemData[elem].controls;
      
      arrows.forEach(arrow => {
        if (arrow.dataset.from === elem && arrow.dataset.to === controller) {
          arrow.classList.add('highlighted', 'ctrl');
        } else {
          arrow.classList.add('dimmed');
        }
      });
    }
  }

  function findController(elem) {
    for (let key in elemData) {
      if (elemData[key].controls === elem) return key;
    }
    return null;
  }
</script>

</body>
</html>
